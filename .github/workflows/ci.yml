name: CI

on:
  push:
    branches: [main, 'release/**']
  pull_request:
    branches: [main, 'release/**']

permissions:
  contents: read

jobs:
  test-php:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    name: PHP Tests (PHP ${{ matrix.php }})

    strategy:
      fail-fast: true
      matrix:
        php: ['8.2', '8.3', '8.4']

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite
          coverage: none

      - name: Remove dev-only path repository
        # composer.json declares a `path` repository pointing at
        # ../cms-framework for the symlinked dev-app workflow. CI has no
        # sibling checkout, so strip it before `composer install` and let
        # Composer resolve cms-framework from Packagist via the ^2.0
        # constraint. Tracked in #434.
        run: |
          jq 'del(.repositories)' composer.json > composer.json.tmp
          mv composer.json.tmp composer.json

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-php${{ matrix.php }}-composer-${{ hashFiles('**/composer.json') }}
          restore-keys: ${{ runner.os }}-php${{ matrix.php }}-composer-

      - name: Remove AI dev deps (PHP 8.2)
        # `artisanpack-ui/ai` (and by extension the AI trigger surface)
        # requires PHP 8.3+. Strip both it and livewire (which the ai
        # package pulls transitively for its admin components) on 8.2 so
        # `composer update` still resolves; the corresponding tests are
        # excluded below via `--exclude-testsuite=Ai`.
        if: matrix.php == '8.2'
        run: |
          jq 'del(.["require-dev"]["artisanpack-ui/ai"], .["require-dev"]["livewire/livewire"])' composer.json > composer.json.tmp
          mv composer.json.tmp composer.json

      - name: Install dependencies
        run: composer update --no-interaction --prefer-dist

      - name: Run tests
        env:
          XDEBUG_MODE: off
        run: |
          if [ "${{ matrix.php }}" = "8.2" ]; then
            ./vendor/bin/pest --ci --no-coverage --exclude-testsuite=Ai
          else
            ./vendor/bin/pest --ci --no-coverage
          fi

  test-js:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    name: JS Tests

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Run Vitest
        run: npm test

      - name: Build library bundle
        run: npm run build:lib

      - name: Build app bundle
        run: npm run build

  upstream-diff:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    name: Block fork upstream-diff

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Run upstream-diff (fails on drift in status=ported files)
        run: npm run upstream-diff -- --json
